# Настройки для book-service
spring:
  data:
    mongodb:
      uri: mongodb://bestuser:bestuser@localhost:27017/bookdb?authSource=admin
      host: localhost
      port: 27017
      database: bookdb
      username: bestuser
      password: bestuser
      authentication-database: admin

# Настройки для подключения к Eureka
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/  # ← ИЗМЕНИТЕ: eureka-server → localhost
  instance:
    prefer-ip-address: true
    hostname: localhost